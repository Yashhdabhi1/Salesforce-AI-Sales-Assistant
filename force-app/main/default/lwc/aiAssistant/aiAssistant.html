<template>
    <lightning-card>

        <!-- ══════════════════════════════ HEADER ══ -->
        <div slot="title" class="card-header">
            <span class="header-icon">🤖</span>
            <span class="header-title">AI Sales Assistant</span>
            <template if:true={hasOppName}>
                <span class="header-opp">{oppMeta.name}</span>
            </template>
        </div>

        <div class="card-body">

            <!-- ══ COMPETITOR ALERT BANNER ══ -->
            <template if:true={hasCompetitors}>
                <div class="competitor-banner">
                    <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                    &nbsp;<strong>Competitor Detected:</strong>&nbsp;{competitorList}
                    &nbsp;— Review your differentiators before the next call.
                </div>
            </template>

            <!-- ══ DEAL HEALTH SCORE CARD + CONFIDENCE GAUGE ══ -->
            <template if:true={hasOppStage}>
                <div class="health-row">

                    <!-- Deal Health Half-Gauge -->
                    <div class="health-card">
                        <div class="health-gauge-wrap">
                            <svg viewBox="0 0 120 70" class="health-svg">
                                <!-- Track -->
                                <path d="M 14 60 A 46 46 0 0 1 106 60"
                                      fill="none" stroke="#e5e7eb" stroke-width="10"
                                      stroke-linecap="round"/>
                                <!-- Fill -->
                                <path d={healthArcPath}
                                      fill="none" stroke={dealHealthColor} stroke-width="10"
                                      stroke-linecap="round"/>
                                <!-- Score text -->
                                <text x="60" y="58" text-anchor="middle"
                                      font-size="18" font-weight="700" fill="#032d60">{dealHealthScore}</text>
                            </svg>
                        </div>
                        <div class="health-footer">
                            <span class="health-title">Deal Health</span>
                            <span class={dealHealthLabelClass}>{dealHealthLabel}</span>
                        </div>
                    </div>

                    <!-- Opp Meta Pills -->
                    <div class="meta-pills">
                        <div class="meta-pill">
                            <span class="meta-label">Stage</span>
                            <span class="meta-value">{oppMeta.stage}</span>
                        </div>
                        <div class="meta-pill">
                            <span class="meta-label">Amount</span>
                            <span class="meta-value">${oppMeta.amount}</span>
                        </div>
                        <div class="meta-pill">
                            <span class="meta-label">Close Date</span>
                            <span class="meta-value">{oppMeta.closeDate}</span>
                        </div>
                        <div class="meta-pill">
                            <span class="meta-label">Probability</span>
                            <span class="meta-value prob-val">{oppMeta.probability}%</span>
                        </div>
                        <div class="meta-pill">
                            <span class="meta-label">Owner</span>
                            <span class="meta-value">{oppMeta.ownerName}</span>
                        </div>
                    </div>

                    <!-- Confidence Score Ring -->
                    <template if:true={hasConfidenceScore}>
                        <div class="confidence-card">
                            <svg viewBox="0 0 80 80" class="conf-svg">
                                <circle cx="40" cy="40" r="30"
                                        fill="none" stroke="#e5e7eb" stroke-width="8"/>
                                <circle cx="40" cy="40" r="30"
                                        fill="none"
                                        stroke={confidenceStroke}
                                        stroke-width="8"
                                        stroke-dasharray={confidenceCircumference}
                                        stroke-dashoffset={confidenceDashOffset}
                                        stroke-linecap="round"
                                        transform="rotate(-90 40 40)"/>
                                <text x="40" y="44" text-anchor="middle"
                                      font-size="18" font-weight="700" fill="#032d60">
                                    {confidenceScore}
                                </text>
                            </svg>
                            <div class="conf-label">AI Confidence</div>
                            <div class="conf-sub">{confidenceLabel}</div>
                        </div>
                    </template>

                </div>
            </template>

            <!-- ══ TABS ══ -->
            <div class="tab-bar">
                <template for:each={tabClasses} for:item="t">
                    <button key={t.value}
                            class={t.cls}
                            data-tab={t.value}
                            onclick={handleTabClick}>
                        {t.label}
                    </button>
                </template>
            </div>

            <!-- ══ LOADER ══ -->
            <template if:true={isLoading}>
                <div class="loader-wrap">
                    <lightning-spinner alternative-text="Thinking..." size="small"></lightning-spinner>
                    <span class="loader-text">AI is thinking…</span>
                </div>
            </template>

            <!-- ════════════════ TAB: SUMMARY ════════════════ -->
            <template if:true={isSummaryTab}>
                <div class="tab-content">

                    <div class="action-row">
                        <lightning-button label="Generate Summary"
                            variant="brand" icon-name="utility:refresh"
                            disabled={isLoading} onclick={handleSummary}>
                        </lightning-button>
                        <template if:true={hasSummary}>
                            <lightning-button label="🔄 Force Refresh"
                                variant="neutral" disabled={isLoading}
                                onclick={handleRefreshSummary}>
                            </lightning-button>
                            <button class="icon-btn" title="Copy summary"
                                    onclick={handleCopySummary}>📋 Copy</button>
                        </template>
                    </div>

                    <!-- Cache badge -->
                    <template if:true={fromCache}>
                        <div class="cache-badge">
                            <lightning-icon icon-name="utility:clock" size="x-small"></lightning-icon>
                            &nbsp;{cacheLabel}
                        </div>
                    </template>

                    <!-- Typing animation while summary loads fresh -->
                    <template if:true={isTypingSummary}>
                        <div class="section-card typing-card">
                            <div class="section-title">📌 Summary</div>
                            <p class="typing-text">{summaryDisplayText}<span class="cursor">|</span></p>
                        </div>
                    </template>

                    <!-- Full summary once loaded -->
                    <template if:true={hasSummary}>
                        <div class="section-card">
                            <div class="section-title">📌 Summary</div>
                            <lightning-formatted-text value={sections.summary}></lightning-formatted-text>
                        </div>

                        <div class="section-card section-risk">
                            <div class="section-title">⚠️ Risks</div>
                            <lightning-formatted-text value={sections.risks}></lightning-formatted-text>
                        </div>

                        <div class="section-card section-steps">
                            <div class="section-title">✅ Next Steps</div>
                            <lightning-formatted-text value={sections.steps}></lightning-formatted-text>
                        </div>

                        <div class="summary-footer">
                            <div class={riskClass}>{sections.riskLevel} Risk</div>
                            <div class="feedback-row">
                                <span class="feedback-label">Helpful?</span>
                                <button class="feedback-btn"
                                        data-id={summaryResponseId} data-value="positive"
                                        onclick={handleFeedback} title="Yes">👍</button>
                                <button class="feedback-btn"
                                        data-id={summaryResponseId} data-value="negative"
                                        onclick={handleFeedback} title="No">👎</button>
                            </div>
                        </div>
                    </template>

                    <!-- Empty state (before any load) -->
                    <template if:false={hasSummary}>
                        <template if:false={isTypingSummary}>
                            <template if:false={isLoading}>
                                <div class="empty-state">
                                    <div class="empty-icon">🧠</div>
                                    <div class="empty-text">Loading your AI summary…</div>
                                </div>
                            </template>
                        </template>
                    </template>

                </div>
            </template>

            <!-- ════════════════ TAB: EMAIL ════════════════ -->
            <template if:true={isEmailTab}>
                <div class="tab-content">

                    <div class="action-row">
                        <lightning-button label="Generate Email"
                            variant="brand" icon-name="utility:email"
                            disabled={isLoading} onclick={handleEmail}>
                        </lightning-button>
                        <template if:true={hasEmail}>
                            <button class="icon-btn" onclick={handleCopyEmail}
                                    title="Copy email">📋 Copy</button>
                        </template>
                    </div>

                    <template if:true={hasEmail}>
                        <div class="email-card">
                            <div class="email-field">
                                <label class="email-field-label">Subject</label>
                                <lightning-input value={emailParsed.subject}
                                    onchange={handleEmailSubjectChange}
                                    variant="label-hidden">
                                </lightning-input>
                            </div>
                            <div class="email-field">
                                <label class="email-field-label">Body</label>
                                <lightning-textarea value={emailParsed.body}
                                    rows="10" onchange={handleEmailBodyChange}
                                    variant="label-hidden">
                                </lightning-textarea>
                            </div>
                            <div class="email-actions">
                                <lightning-button label={sendLabel} variant="brand"
                                    icon-name="utility:send" disabled={isSending}
                                    onclick={handleSendEmail}>
                                </lightning-button>
                            </div>
                        </div>
                    </template>

                    <template if:false={hasEmail}>
                        <div class="empty-state">
                            <div class="empty-icon">✉️</div>
                            <div class="empty-text">Click <strong>Generate Email</strong> to draft a personalised follow-up.</div>
                        </div>
                    </template>

                </div>
            </template>

            <!-- ════════════════ TAB: CHAT ════════════════ -->
            <template if:true={isChatTab}>
                <div class="tab-content">

                    <div class="chat-scroll">
                        <template if:false={hasMessages}>
                            <div class="chat-empty">Ask anything about this opportunity…</div>
                        </template>
                        <template for:each={messages} for:item="msg">
                            <div key={msg.id} class={msg.className}>
                                {msg.text}<template if:true={isLoading}><span class="cursor">|</span></template>
                            </div>
                        </template>
                    </div>

                    <div class="chat-input-row">
                        <div class="chat-input-wrap">
                            <lightning-input placeholder="Ask AI about this deal… (Enter to send)"
                                value={userInput} onchange={handleInputChange}
                                onkeyup={handleInputKeyUp}
                                variant="label-hidden">
                            </lightning-input>
                        </div>
                        <lightning-button label="Send" variant="brand"
                            disabled={isLoading} onclick={handleAsk}>
                        </lightning-button>
                    </div>

                </div>
            </template>

            <!-- ════════════════ TAB: HISTORY ════════════════ -->
            <template if:true={isHistoryTab}>
                <div class="tab-content">

                    <div class="history-filter-row">
                        <lightning-combobox label="Filter by type"
                            value={historyFilter}
                            options={historyFilterOptions}
                            onchange={handleHistoryFilterChange}
                            variant="label-inline">
                        </lightning-combobox>
                    </div>

                    <template if:true={hasHistory}>
                        <template for:each={history} for:item="h">
                            <div key={h.Id} class="history-card">
                                <div class="history-header">
                                    <span class={h.typeBadge}>{h.typeLabel}</span>
                                    <span class="history-date">
                                        <lightning-formatted-date-time value={h.CreatedDate}
                                            year="numeric" month="short" day="2-digit"
                                            hour="2-digit" minute="2-digit">
                                        </lightning-formatted-date-time>
                                    </span>
                                </div>
                                <div class="history-body">{h.shortResponse}</div>
                                <template if:true={h.Feedback__c}>
                                    <div class="history-feedback">Feedback: {h.Feedback__c}</div>
                                </template>
                            </div>
                        </template>
                    </template>

                    <template if:false={hasHistory}>
                        <div class="empty-state">
                            <div class="empty-icon">🕓</div>
                            <div class="empty-text">No AI history yet for this record.</div>
                        </div>
                    </template>

                </div>
            </template>

        </div><!-- end card-body -->
    </lightning-card>
</template>
